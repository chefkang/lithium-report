<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>大宗商品监控系统 | Commodity Monitor</title>
    <style>
        :root {
            --primary: #1a365d;
            --secondary: #2c5282;
            --accent: #3182ce;
            --success: #276749;
            --danger: #c53030;
            --warning: #d69e2e;
            --bg: #f7fafc;
            --card: #ffffff;
            --text: #2d3748;
            --text-light: #718096;
            --border: #e2e8f0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            line-height: 1.6;
            overflow: hidden;
            height: 100vh;
        }
        
        /* 顶部导航栏 - 固定 */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            z-index: 1000;
        }
        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 12px 16px;
        }
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .header-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary);
        }
        .current-time {
            font-size: 13px;
            color: var(--text-light);
        }
        
        /* 商品导航栏 */
        .commodity-nav {
            display: flex;
            overflow-x: auto;
            gap: 8px;
            padding-bottom: 8px;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .commodity-nav::-webkit-scrollbar { display: none; }
        .nav-item {
            padding: 8px 16px;
            background: white;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 13px;
            font-weight: 500;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .nav-item:hover, .nav-item.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        /* 主内容区域 - 水平滑动 */
        .main-container {
            position: fixed;
            top: 100px;
            left: 0;
            right: 0;
            bottom: 0;
            overflow: hidden;
        }
        .scroll-container {
            display: flex;
            height: 100%;
            overflow-x: auto;
            overflow-y: hidden;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .scroll-container::-webkit-scrollbar { display: none; }
        
        /* 商品页面 - 独立可滚动 */
        .commodity-page {
            flex: 0 0 100vw;
            width: 100vw;
            height: 100%;
            scroll-snap-align: start;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            padding: 16px;
        }
        
        /* 页面头部 */
        .page-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            padding: 24px;
            border-radius: 12px;
            margin-bottom: 16px;
        }
        .commodity-info {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .commodity-name {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .commodity-symbol {
            font-size: 14px;
            opacity: 0.9;
        }
        .price-display {
            text-align: right;
        }
        .current-price {
            font-size: 36px;
            font-weight: 800;
            font-family: monospace;
        }
        .price-change {
            font-size: 14px;
            font-weight: 600;
        }
        .change-up { color: #9ae6b4; }
        .change-down { color: #fc8181; }
        
        .page-header p {
            font-size: 13px;
            opacity: 0.9;
            line-height: 1.5;
        }
        
        /* 快速统计 */
        .quick-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }
        .stat-card {
            background: white;
            padding: 16px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }
        .stat-label {
            font-size: 11px;
            color: var(--text-light);
            margin-bottom: 6px;
        }
        .stat-value {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
            font-family: monospace;
        }
        .stat-change {
            font-size: 12px;
            margin-top: 4px;
        }
        
        /* 数据表格 */
        .data-section, .analysis-section, .news-section {
            background: white;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid var(--border);
            margin-bottom: 16px;
        }
        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--border);
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }
        .data-table th {
            background: #f8fafc;
            padding: 10px 8px;
            text-align: left;
            font-weight: 600;
            color: var(--text-light);
            font-size: 10px;
            border-bottom: 2px solid var(--border);
        }
        .data-table td {
            padding: 12px 8px;
            border-bottom: 1px solid var(--border);
        }
        
        /* 分析卡片 */
        .analysis-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .analysis-card {
            background: #f8fafc;
            padding: 16px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }
        .analysis-card h4 {
            font-size: 14px;
            margin-bottom: 8px;
            color: var(--primary);
        }
        .analysis-card p {
            font-size: 13px;
            color: var(--text);
            line-height: 1.5;
        }
        
        /* 新闻 */
        .news-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .news-item {
            padding: 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: #fafafa;
        }
        .news-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .news-tag {
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 4px;
            font-weight: 600;
        }
        .news-date { font-size: 11px; color: var(--text-light); }
        .news-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--primary);
            line-height: 1.4;
        }
        .news-source {
            font-size: 11px;
            color: var(--text-light);
            margin-top: 6px;
        }
        
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }
        .badge-up { background: #c6f6d5; color: var(--success); }
        .badge-down { background: #fed7d7; color: var(--danger); }
        
        .footer {
            text-align: center;
            padding: 20px;
            color: var(--text-light);
            font-size: 11px;
        }
        
        /* 平板及以上 */
        @media (min-width: 768px) {
            .header-content { padding: 16px 24px; }
            .header-title { font-size: 24px; }
            .commodity-page { padding: 24px; max-width: 1400px; margin: 0 auto; }
            .page-header { padding: 32px 40px; }
            .commodity-name { font-size: 32px; }
            .current-price { font-size: 48px; }
            .quick-stats { grid-template-columns: repeat(4, 1fr); }
            .stat-value { font-size: 24px; }
            .data-section, .analysis-section, .news-section { padding: 28px; }
            .analysis-grid { display: grid; grid-template-columns: repeat(3, 1fr); }
            .news-grid { display: grid; grid-template-columns: repeat(2, 1fr); }
            .data-table { font-size: 14px; }
            .data-table th, .data-table td { padding: 16px 12px; }
        }
    </style>
</head>
<body>
    <!-- 头部 -->
    <div class="header">
        <div class="header-content">
            <div class="header-top">
                <div class="header-title">📊 大宗商品监控系统</div>

            </div>
            <div class="commodity-nav" id="navContainer"></div>

    <!-- 主内容 -->
    <div class="main-container">

    <script>
        // 商品数据
        const commodities = [

        const priceData = {
            '碳酸锂': [
                { spec: '电池级 99.5%', range: '158,500-160,500', avg: '159,500', change: '+800', use: '磷酸铁锂电池' },
                { spec: '工业级 99.2%', range: '156,000-158,000', avg: '157,000', change: '+750', use: '陶瓷、玻璃' },

            ],
            '氢氧化锂': [
                { spec: '电池级 56.5%', range: '151,500-154,500', avg: '153,000', change: '-700', use: '高镍三元电池' },

                { spec: '电解铜 99.95%', range: '72,200-72,700', avg: '72,450', change: '+180', use: '电线电缆' },
                { spec: '铜杆 8mm', range: '73,100-73,600', avg: '73,350', change: '+190', use: '电力设备' },

                { spec: '锡焊条', range: '248,000-250,000', avg: '249,000', change: '+1,400', use: '电子焊接' },

            ],
            '镍': [
                { spec: '电解镍 99.9%', range: '133,000-134,000', avg: '133,500', change: '-920', use: '不锈钢' },
                { spec: '电池级硫酸镍', range: '32,500-33,200', avg: '32,850', change: '-350', use: '三元前驱体' },
                { spec: 'LME三月期镍', range: '$16,800-17,100', avg: '$16,950', change: '-$115', use: '国际基准' }
            ],
            '黄金': [
                { spec: 'Au99.99', range: '568.5-569.9', avg: '569.2', change: '+2.8', use: '投资储备' },
                { spec: '国际金价', range: '$2,355-2,370', avg: '$2,362.5', change: '+$11.5', use: '美元/盎司' },
                { spec: '黄金期货', range: '569.5-571.0', avg: '570.2', change: '+2.5', use: '上期所' }
            ],
            '白银': [
                { spec: 'Ag99.99', range: '7,860-7,890', avg: '7,875', change: '+38', use: '工业/投资' },
                { spec: '国际银价', range: '$28.3-28.7', avg: '$28.5', change: '+$0.14', use: '美元/盎司' },
                { spec: '白银期货', range: '7,880-7,920', avg: '7,900', change: '+35', use: '上期所' }
            ],
            '铁矿石': [

                { spec: '上海期货SC', range: '645-655', avg: '650', change: '-2.5', use: '人民币/桶' }

        function generatePage(c, i) {
            const isUp = c.change >= 0;
            const prefix = c.unit === '美元/桶' ? '$' : '¥';
            const rows = (priceData[c.name] || []).map(r => `
                <tr>
                    <td><strong>${r.spec}</strong></td>
                    <td>${r.range}</td>
                    <td>${r.avg}</td>
                    <td><span class="badge ${r.change.includes('+') ? 'badge-up' : 'badge-down'}">${r.change}</span></td>
                    <td>${r.use}</td>
                </tr>
            `).join('');

            return `
                <div class="commodity-page" id="${c.id}">
                    <div class="page-header">
                        <div class="commodity-info">

                        <div class="stat-card">
                            <div class="stat-label">月涨跌</div>
                            <div class="stat-value">${isUp ? '+' : ''}${(c.change * 22).toLocaleString()}</div>
                            <div class="stat-change ${isUp ? 'change-up' : 'change-down'}">月${isUp ? '涨' : '跌'}${Math.abs(c.changePct * 22).toFixed(1)}%</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">年涨跌</div>
                            <div class="stat-value">${isUp ? '+' : ''}${(c.change * 252).toLocaleString()}</div>
                            <div class="stat-change ${isUp ? 'change-up' : 'change-down'}">年${isUp ? '涨' : '跌'}${Math.abs(c.changePct * 252).toFixed(1)}%</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">市场情绪</div>
                            <div class="stat-value">${isUp ? '看涨' : '看跌'}</div>
                            <div class="stat-change">${isUp ? '多头占优' : '空头占优'}</div>
                        </div>
                    </div>

                    <div class="data-section">
                        <div class="section-title">📊 现货价格详情</div>
                        <table class="data-table">
                            <thead><tr><th>规格</th><th>价格区间</th><th>均价</th><th>涨跌</th><th>用途</th></tr></thead>
                            <tbody>${rows}</tbody>
                        </table>
                    </div>

                    <div class="analysis-section">
                        <div class="section-title">📈 市场分析</div>
                        <div class="analysis-grid">
                            <div class="analysis-card">
                                <h4>趋势判断</h4>
                                <p>${c.name}当前呈现<strong>${isUp ? '震荡上行' : '承压整理'}</strong>态势，市场情绪${isUp ? '积极' : '谨慎'}。</p>
                            </div>
                            <div class="analysis-card">
                                <h4>支撑与阻力</h4>

                            </div>

            `;
        }

        function init() {
            const nav = document.getElementById('navContainer');
            const container = document.getElementById('scrollContainer');
            
            // 生成导航和页面
            commodities.forEach((c, i) => {
                // 导航
                const btn = document.createElement('button');
                btn.className = 'nav-item' + (i === 0 ? ' active' : '');
                btn.textContent = c.name;
                btn.onclick = () => {
                    container.scrollTo({ left: window.innerWidth * i, behavior: 'smooth' });
                };
                nav.appendChild(btn);
                
                // 页面
                container.insertAdjacentHTML('beforeend', generatePage(c, i));
            });
            
            // 滚动同步导航
            container.addEventListener('scroll', () => {
                const idx = Math.round(container.scrollLeft / window.innerWidth);
                document.querySelectorAll('.nav-item').forEach((b, i) => {
                    b.classList.toggle('active', i === idx);
                });
                // 自动滚动导航栏
                nav.scrollTo({ left: idx * 80 - 100, behavior: 'smooth' });
            });
            
            // 更新时间
            document.getElementById('currentTime').textContent = 
                new Date().toLocaleString('zh-CN').replace(/\//g, '-') + ' CST';
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
