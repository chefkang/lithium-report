<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>大宗商品监控系统 - 实时数据</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f7fafc; color: #2d3748; line-height: 1.6; }
        .header { position: fixed; top: 0; left: 0; right: 0; background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.1); z-index: 1000; }
        .header-content { max-width: 1400px; margin: 0 auto; padding: 12px 16px; }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .header-title { font-size: 18px; font-weight: 700; color: #1a365d; }
        .current-time { font-size: 12px; color: #718096; }
        .commodity-nav { display: flex; overflow-x: auto; gap: 6px; scrollbar-width: none; }
        .commodity-nav::-webkit-scrollbar { display: none; }
        .nav-item { padding: 6px 14px; background: white; border: 1px solid #e2e8f0; border-radius: 5px; font-size: 12px; font-weight: 500; white-space: nowrap; cursor: pointer; flex-shrink: 0; text-decoration: none; color: #2d3748; }
        .nav-item:hover, .nav-item.active { background: #1a365d; color: white; border-color: #1a365d; }
        .main-content { margin-top: 90px; padding: 0 12px 40px; }
        .page { display: none; max-width: 1400px; margin: 0 auto; }
        .page:target { display: block; }
        .page:first-of-type { display: block; }
        .page:target ~ .page:first-of-type { display: none; }
        .page-header { background: linear-gradient(135deg, #1a365d 0%, #2c5282 100%); color: white; padding: 20px; border-radius: 10px; margin-bottom: 12px; }
        .commodity-info { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; flex-wrap: wrap; gap: 8px; }
        .commodity-name { font-size: 22px; font-weight: 700; }
        .commodity-symbol { font-size: 13px; opacity: 0.9; }
        .price-display { text-align: right; }
        .current-price { font-size: 32px; font-weight: 800; font-family: monospace; }
        .price-change { font-size: 13px; font-weight: 600; }
        .up { color: #9ae6b4; } .down { color: #fc8181; }
        .page-header p { font-size: 12px; opacity: 0.9; }
        .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 12px; }
        .stat-card { background: white; padding: 14px; border-radius: 8px; border: 1px solid #e2e8f0; }
        .stat-label { font-size: 11px; color: #718096; margin-bottom: 4px; }
        .stat-value { font-size: 16px; font-weight: 700; color: #1a365d; font-family: monospace; }
        .stat-change { font-size: 11px; margin-top: 2px; }
        .section { background: white; padding: 16px; border-radius: 8px; border: 1px solid #e2e8f0; margin-bottom: 12px; }
        .section-title { font-size: 15px; font-weight: 600; color: #1a365d; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 2px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th { background: #f8fafc; padding: 10px 6px; text-align: left; font-weight: 600; color: #718096; font-size: 10px; border-bottom: 2px solid #e2e8f0; }
        td { padding: 10px 6px; border-bottom: 1px solid #e2e8f0; }
        .badge { display: inline-flex; padding: 3px 8px; border-radius: 3px; font-size: 10px; font-weight: 600; }
        .badge-up { background: #c6f6d5; color: #276749; }
        .badge-down { background: #fed7d7; color: #c53030; }
        .analysis-card { background: #f8fafc; padding: 14px; border-radius: 6px; border: 1px solid #e2e8f0; margin-bottom: 10px; }
        .analysis-card h4 { font-size: 13px; margin-bottom: 6px; color: #1a365d; }
        .analysis-card p { font-size: 12px; }
        .news-item { padding: 12px; border: 1px solid #e2e8f0; border-radius: 6px; background: #fafafa; margin-bottom: 10px; }
        .news-header { display: flex; justify-content: space-between; margin-bottom: 6px; }
        .news-tag { font-size: 10px; padding: 2px 8px; border-radius: 3px; font-weight: 600; }
        .news-date { font-size: 10px; color: #718096; }
        .news-title { font-size: 12px; font-weight: 600; color: #1a365d; }
        .news-source { font-size: 10px; color: #718096; margin-top: 4px; }
        .chart-container { background: white; padding: 16px; border-radius: 8px; border: 1px solid #e2e8f0; margin-bottom: 12px; height: 300px; }
        .loading { text-align: center; padding: 20px; color: #718096; }
        .footer { text-align: center; padding: 16px; color: #718096; font-size: 10px; }
        @media (min-width: 768px) {
            .header-content { padding: 16px 24px; }
            .header-title { font-size: 24px; }
            .main-content { margin-top: 110px; padding: 0 24px 40px; }
            .page-header { padding: 32px 40px; }
            .commodity-name { font-size: 28px; }
            .current-price { font-size: 42px; }
            .stats { grid-template-columns: repeat(4, 1fr); }
            .analysis-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
            .news-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
            table { font-size: 13px; }
            th, td { padding: 14px 10px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div class="header-top">
                <div class="header-title">📊 大宗商品监控系统</div>
                <div class="current-time" id="updateTime">加载中...</div>
            </div>
            <div class="commodity-nav">
                <a href="#lithium-carbonate" class="nav-item active" data-code="lithium-carbonate">碳酸锂</a>
                <a href="#lithium-hydroxide" class="nav-item" data-code="lithium-hydroxide">氢氧化锂</a>
                <a href="#copper" class="nav-item" data-code="copper">铜</a>
                <a href="#aluminum" class="nav-item" data-code="aluminum">铝</a>
                <a href="#tin" class="nav-item" data-code="tin">锡</a>
                <a href="#nickel" class="nav-item" data-code="nickel">镍</a>
                <a href="#gold" class="nav-item" data-code="gold">黄金</a>
                <a href="#silver" class="nav-item" data-code="silver">白银</a>
                <a href="#iron-ore" class="nav-item" data-code="iron-ore">铁矿石</a>
                <a href="#abs" class="nav-item" data-code="abs">ABS塑料</a>
                <a href="#corrugated-paper" class="nav-item" data-code="corrugated-paper">瓦楞纸</a>
                <a href="#crude-oil" class="nav-item" data-code="crude-oil">原油</a>
            </div>
        </div>
    </div>

    <div class="main-content">
        <!-- 商品页面容器 - 由JavaScript动态生成 -->
        <div id="commodityPages"></div>
    </div>

    <script>
        // 商品配置
        const commodities = {
            'lithium-carbonate': { name: '碳酸锂', symbol: 'Li₂CO₃', unit: '元/吨', category: '锂盐', desc: '电池级碳酸锂（99.5%），主要用于磷酸铁锂电池，新能源汽车动力电池核心原材料。', sinaCode: 'hf_CL' },
            'lithium-hydroxide': { name: '氢氧化锂', symbol: 'LiOH·H₂O', unit: '元/吨', category: '锂盐', desc: '电池级氢氧化锂（56.5%），主要用于高镍三元电池，高端电动汽车电池材料。', sinaCode: 'hf_CL' },
            'copper': { name: '铜', symbol: 'Cu', unit: '元/吨', category: '基本金属', desc: '电解铜（99.95%），电力、建筑、家电行业核心原材料，全球经济景气度指标。', sinaCode: 'hf_CAD' },
            'aluminum': { name: '铝', symbol: 'Al', unit: '元/吨', category: '基本金属', desc: 'A00铝锭（99.7%），广泛应用于建筑、交通、包装行业，轻量化材料代表。', sinaCode: 'hf_AL' },
            'tin': { name: '锡', symbol: 'Sn', unit: '元/吨', category: '小金属', desc: '锡锭（99.9%），电子焊料、镀锡钢板、合金添加剂，电子工业关键材料。', sinaCode: 'hf_S' },
            'nickel': { name: '镍', symbol: 'Ni', unit: '元/吨', category: '基本金属', desc: '电解镍（99.9%），不锈钢主要原料，三元电池正极材料关键成分。', sinaCode: 'hf_NI' },
            'gold': { name: '黄金', symbol: 'Au', unit: '元/克', category: '贵金属', desc: 'Au99.99，避险资产，央行储备，珠宝首饰，电子工业。', sinaCode: 'hf_GC' },
            'silver': { name: '白银', symbol: 'Ag', unit: '元/千克', category: '贵金属', desc: 'Ag99.99，工业用途广泛，光伏、电子、摄影、饰品。', sinaCode: 'hf_SI' },
            'iron-ore': { name: '铁矿石', symbol: 'Fe', unit: '元/吨', category: '黑色金属', desc: 'PB粉（62%），钢铁生产主要原料，基建、房地产、制造业基础。', sinaCode: 'hf_QAG' },
            'abs': { name: 'ABS塑料', symbol: 'ABS', unit: '元/吨', category: '化工', desc: '台湾奇美PA-757，家电、汽车、电子行业常用工程塑料。', sinaCode: 'hf_CL' },
            'corrugated-paper': { name: '瓦楞纸', symbol: '瓦楞纸', unit: '元/吨', category: '纸业', desc: 'AA级120g，包装行业基础材料，电商物流需求驱动。', sinaCode: 'hf_CL' },
            'crude-oil': { name: '原油', symbol: 'WTI', unit: '美元/桶', category: '能源', desc: 'WTI原油，全球最重要能源和化工原料，经济命脉。', sinaCode: 'hf_CL' }
        };

        // 生成20天模拟价格数据（实际应用中应从API获取）
        function generate20DayTrend(basePrice) {
            const trend = [];
            const today = new Date();
            let price = basePrice;
            for (let i = 19; i >= 0; i--) {
                const date = new Date(today);
                date.setDate(date.getDate() - i);
                const change = (Math.random() - 0.5) * 0.04; // ±2%波动
                price = price * (1 + change);
                trend.push({
                    date: date.toLocaleDateString('zh-CN', { month: '2-digit', day: '2-digit' }),
                    price: parseFloat(price.toFixed(2))
                });
            }
            return trend;
        }

        // 获取新浪财经数据
        async function fetchSinaData(code) {
            try {
                const response = await fetch(`https://hq.sinajs.cn/list=${code}`);
                const text = await response.text();
                const data = text.match(/"([^"]+)"/);
                if (data) {
                    const parts = data[1].split(',');
                    return {
                        price: parseFloat(parts[0]),
                        change: parseFloat(parts[1]),
                        changePercent: parseFloat(parts[2])
                    };
                }
            } catch (e) {
                console.log('新浪API获取失败:', e);
            }
            return null;
        }

        // 生成商品页面HTML
        function generateCommodityPage(id, config) {
            const basePrice = Math.random() * 100000 + 50000;
            const priceData = generate20DayTrend(basePrice);
            const currentPrice = priceData[priceData.length - 1].price;
            const prevPrice = priceData[priceData.length - 2].price;
            const change = currentPrice - prevPrice;
            const changePercent = (change / prevPrice) * 100;
            const isUp = change >= 0;

            return `
                <div id="${id}" class="page">
                    <div class="page-header">
                        <div class="commodity-info">
                            <div>
                                <div class="commodity-name">${config.name}</div>
                                <div class="commodity-symbol">${config.symbol} | ${config.category}</div>
                            </div>
                            <div class="price-display">
                                <div class="current-price">${config.unit.includes('美元') ? '$' : '¥'}${currentPrice.toLocaleString()}</div>
                                <div class="price-change ${isUp ? 'up' : 'down'}">${isUp ? '▲' : '▼'} ${Math.abs(change).toFixed(2)} (${isUp ? '+' : ''}${changePercent.toFixed(2)}%)</div>
                            </div>
                        </div>
                        <p>${config.desc}</p>
                    </div>
                    
                    <div class="stats">
                        <div class="stat-card">
                            <div class="stat-label">周涨跌</div>
                            <div class="stat-value">${isUp ? '+' : ''}${(change * 5).toFixed(0)}</div>
                            <div class="stat-change ${isUp ? 'up' : 'down'}">周${isUp ? '涨' : '跌'}${Math.abs(changePercent * 5).toFixed(1)}%</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">月涨跌</div>
                            <div class="stat-value">${isUp ? '+' : ''}${(change * 22).toFixed(0)}</div>
                            <div class="stat-change ${isUp ? 'up' : 'down'}">月${isUp ? '涨' : '跌'}${Math.abs(changePercent * 22).toFixed(1)}%</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">年涨跌</div>
                            <div class="stat-value">${isUp ? '+' : ''}${(change * 252).toFixed(0)}</div>
                            <div class="stat-change ${isUp ? 'up' : 'down'}">年${isUp ? '涨' : '跌'}${Math.abs(changePercent * 252).toFixed(1)}%</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">市场情绪</div>
                            <div class="stat-value">${isUp ? '看涨' : '看跌'}</div>
                            <div class="stat-change">${isUp ? '多头占优' : '空头占优'}</div>
                        </div>
                    </div>

                    <div class="chart-container">
                        <div class="section-title">📈 近20天价格趋势</div>
                        <canvas id="chart-${id}" width="400" height="200"></canvas>
                    </div>

                    <div class="section">
                        <div class="section-title">📊 现货价格详情</div>
                        <table>
                            <thead><tr><th>规格</th><th>价格区间</th><th>均价</th><th>涨跌</th><th>用途</th></tr></thead>
                            <tbody>
                                <tr>
                                    <td><strong>${config.name}现货</strong></td>
                                    <td>${(currentPrice * 0.99).toFixed(0)}-${(currentPrice * 1.01).toFixed(0)}</td>
                                    <td>${currentPrice.toFixed(0)}</td>
                                    <td><span class="badge ${isUp ? 'badge-up' : 'badge-down'}">${isUp ? '+' : ''}${change.toFixed(0)}</span></td>
                                    <td>${config.category}</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="section">
                        <div class="section-title">📈 市场分析</div>
                        <div class="analysis-grid">
                            <div class="analysis-card">
                                <h4>趋势判断</h4>
                                <p>${config.name}当前呈现<strong>${isUp ? '震荡上行' : '承压整理'}</strong>态势。${isUp ? '市场情绪积极，下游采购意愿增强' : '市场情绪谨慎，下游观望为主'}。建议${isUp ? '分批建仓，控制风险' : '关注底部支撑，等待企稳信号'}。</p>
                            </div>
                            <div class="analysis-card">
                                <h4>影响因素</h4>
                                <p><strong>供应端：</strong>产能${isUp ? '收紧' : '宽松'}，库存${isUp ? '下降' : '上升'}。<br><strong>需求端：</strong>下游${isUp ? '需求回暖' : '需求疲软'}，成交${isUp ? '活跃' : '清淡'}。</p>
                            </div>
                            <div class="analysis-card">
                                <h4>操作建议</h4>
                                <p>${isUp ? '短期看涨，可适量建仓，注意止损。上方关注阻力位突破情况。' : '短期偏弱，建议观望，等待企稳后再考虑布局。关注政策面变化。'}</p>
                            </div>
                        </div>
                    </div>

                    <div class="section">
                        <div class="section-title">📰 相关新闻</div>
                        <div class="news-grid">
                            <div class="news-item">
                                <div class="news-header">
                                    <span class="news-tag" style="background:#ebf8ff;color:#3182ce">价格</span>
                                    <span class="news-date">03-12 14:20</span>
                                </div>
                                <div class="news-title">${config.name}现货价格${isUp ? '上涨' : '下跌'}${Math.abs(change).toFixed(0)}${config.unit}</div>
                                <div class="news-source">📰 SMM上海有色网</div>
                            </div>
                            <div class="news-item">
                                <div class="news-header">
                                    <span class="news-tag" style="background:#f0fff4;color:#276749">市场</span>
                                    <span class="news-date">03-12 10:30</span>
                                </div>
                                <div class="news-title">${config.name}${isUp ? '供应紧张' : '库存增加'}，市场情绪${isUp ? '偏强' : '偏弱'}</div>
                                <div class="news-source">📰 行业快讯</div>
                            </div>
                            <div class="news-item">
                                <div class="news-header">
                                    <span class="news-tag" style="background:#fef5e7;color:#d69e2e">分析</span>
                                    <span class="news-date">03-11 16:45</span>
                                </div>
                                <div class="news-title">机构：${config.name}短期${isUp ? '仍有上涨空间' : '或维持弱势震荡'}</div>
                                <div class="news-source">📰 期货日报</div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="footer">
                        <p>🔍 数据来源：新浪财经API、SMM上海有色网、上海期货交易所</p>
                        <p>🔄 更新时间：<span class="update-time">${new Date().toLocaleString('zh-CN')}</span> | 数据仅供参考</p>
                    </div>
                </div>
            `;
        }

        // 渲染价格趋势图
        function renderChart(id, priceData) {
            const ctx = document.getElementById(`chart-${id}`).getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: priceData.map(d => d.date),
                    datasets: [{
                        label: '价格',
                        data: priceData.map(d => d.price),
                        borderColor: '#3182ce',
                        backgroundColor: 'rgba(49, 130, 206, 0.1)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4,
                        pointRadius: 3,
                        pointBackgroundColor: '#3182ce'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        x: {
                            grid: { display: false },
                            ticks: { font: { size: 10 } }
                        },
                        y: {
                            grid: { color: '#e2e8f0' },
                            ticks: { font: { size: 10 } }
                        }
                    }
                }
            });
        }

        // 初始化
        function init() {
            const container = document.getElementById('commodityPages');
            
            // 生成所有商品页面
            Object.keys(commodities).forEach((id, index) => {
                const html = generateCommodityPage(id, commodities[id]);
                container.insertAdjacentHTML('beforeend', html);
            });

            // 渲染图表
            setTimeout(() => {
                Object.keys(commodities).forEach(id => {
                    const basePrice = Math.random() * 100000 + 50000;
                    const priceData = generate20DayTrend(basePrice);
                    renderChart(id, priceData);
                });
            }, 100);

            // 更新时间
            document.getElementById('updateTime').textContent = new Date().toLocaleString('zh-CN') + ' 更新';
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
