            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .nav-item:hover {

        .nav-item.active {

            scrollbar-width: none;
            -ms-overflow-style: none;

        .commodity-name {

        .stat-card {

            padding-right: 20px;

            top: 0;

            opacity: 0.5;

        .news-item:hover .news-title {

            .analysis-card { padding: 16px; }

                // 化工
                '化工': {
                    trend: commodity.change > 0 ? '成本推动，价格稳中有升' : '需求疲软，价格承压',
                    support: commodity.change > 0 ? '原料成本支撑，低库存提供支撑' : '成本线附近有支撑，行业集中度提高',
                    resistance: commodity.change > 0 ? '下游接受度有限，替代品竞争' : '产能过剩压力，出口市场竞争激烈',
                    suggestion: commodity.change > 0 ? '关注成本变化，谨慎追高' : '关注行业整合机会，等待需求回暖',
                    technical: commodity.change > 0 ? '技术指标中性偏强，但上行空间有限' : '技术面偏弱，等待筑底信号',
                    fundamental: '原料价格波动影响成本，下游家电汽车需求分化，出口市场面临竞争',
                    risk: '原油价格大幅波动、环保政策收紧、国际贸易摩擦'
                },
                // 纸业
                '纸业': {
                    trend: commodity.change > 0 ? '需求季节性回暖，价格企稳' : '供需宽松，价格承压',
                    support: commodity.change > 0 ? '成本支撑明显，电商需求有支撑' : '行业亏损严重，减产预期提供支撑',
                    resistance: commodity.change > 0 ? '高库存压制，新增产能压力' : '需求疲软，替代品竞争',
                    suggestion: commodity.change > 0 ? '关注库存去化，谨慎操作' : '等待行业整合，关注政策变化',
                    technical: commodity.change > 0 ? '技术面超跌反弹，量能不足' : '技术面偏空，均线系统压制',
                    fundamental: '限塑令推动纸包装需求，但整体经济疲软影响消费，原材料价格波动影响成本',
                    risk: '消费需求不及预期、原材料价格大幅波动、环保政策变化'
                },
                // 能源
                '能源': {
                    trend: commodity.change > 0 ? '地缘政治支撑，震荡偏强' : '需求担忧，震荡下行',
                    support: commodity.change > 0 ? 'OPEC+减产提供支撑，地缘政治风险溢价' : '技术面支撑，减产预期',
                    resistance: commodity.change > 0 ? '需求担忧限制涨幅，库存压力' : '经济衰退担忧，美元走强压制',
                    suggestion: commodity.change > 0 ? '可适度参与，但需控制风险敞口' : '等待企稳信号，关注OPEC+会议',
                    technical: commodity.change > 0 ? '技术指标中性，区间震荡' : '技术面偏弱，但超卖可能反弹',
                    fundamental: '全球经济增长放缓压制需求，但供应端存在地缘政治风险，OPEC+政策影响供应',
                    risk: '全球经济衰退、地缘政治冲突升级、OPEC+政策变化、美元走势'
                }
            };
            
            // 确定商品类别
            let category = '基本金属'; // 默认
            if (commodity.category === '锂盐') category = '锂盐';
            else if (commodity.category === '贵金属') category = '贵金属';
            else if (commodity.category === '黑色金属') category = '黑色金属';
            else if (commodity.category === '化工') category = '化工';
            else if (commodity.category === '纸业') category = '纸业';
            else if (commodity.category === '能源') category = '能源';
            
            return analysisByCategory[category] || analysisByCategory['基本金属'];
        };

        // 生成商品页面HTML
        function generateCommodityPage(commodity) {
            const priceData = getPriceTableData(commodity);
            const newsData = getNewsData(commodity);
            const analysisData = getAnalysisData(commodity);
            
            return `
                <div class="commodity-page" id="${commodity.id}">
                    <!-- 页面头部 -->
                    <div class="page-header">
                        <div class="commodity-info">
                            <div>
                                <div class="commodity-name">${commodity.name}</div>
                                <div class="commodity-symbol">${commodity.symbol} | ${commodity.category}</div>
                            </div>
                            <div class="price-display">
                                <div class="current-price">${commodity.unit === '美元/桶' ? '$' : '¥'}${commodity.currentPrice.toLocaleString()}</div>
                                <div class="price-change ${commodity.change > 0 ? 'change-up' : 'change-down'}">
                                    ${commodity.change > 0 ? '▲' : '▼'} ${Math.abs(commodity.change)}${commodity.unit.split('/')[0]} (${commodity.changePercent > 0 ? '+' : ''}${commodity.changePercent.toFixed(2)}%)
                                </div>
                            </div>
                        </div>
                        <p>${commodity.description}</p>
                    </div>

                    <!-- 快速统计 -->
                    <div class="quick-stats">
                        <div class="stat-card">
                            <div class="stat-label">周涨跌</div>
                            <div class="stat-value">${commodity.change > 0 ? '+' : ''}${(commodity.change * 5).toLocaleString()}${commodity.unit.split('/')[0]}</div>
                            <div class="stat-change ${commodity.change > 0 ? 'change-up' : 'change-down'}">周${commodity.change > 0 ? '涨' : '跌'}${Math.abs(commodity.changePercent * 5).toFixed(1)}%</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">月涨跌</div>
                            <div class="stat-value">${commodity.change > 0 ? '+' : ''}${(commodity.change * 22).toLocaleString()}${commodity.unit.split('/')[0]}</div>
                            <div class="stat-change ${commodity.change > 0 ? 'change-up' : 'change-down'}">月${commodity.change > 0 ? '涨' : '跌'}${Math.abs(commodity.changePercent * 22).toFixed(1)}%</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">年涨跌</div>
                            <div class="stat-value">${commodity.change > 0 ? '+' : ''}${(commodity.change * 252).toLocaleString()}${commodity.unit.split('/')[0]}</div>
                            <div class="stat-change ${commodity.change > 0 ? 'change-up' : 'change-down'}">年${commodity.change > 0 ? '涨' : '跌'}${Math.abs(commodity.changePercent * 252).toFixed(1)}%</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">市场情绪</div>
                            <div class="stat-value">${commodity.change > 0 ? '看涨' : '看跌'}</div>
                            <div class="stat-change">${commodity.change > 0 ? '多头占优' : '空头占优'}</div>
                        </div>
                    </div>

                    <!-- 价格详情表格 -->
                    <div class="data-section">
                        <div class="section-title">📊 现货价格详情</div>
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>规格</th>
                                    <th>价格区间</th>
                                    <th>均价</th>
                                    <th>日涨跌</th>
                                    <th>主要用途</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${priceData.map(item => `
                                    <tr>
                                        <td><strong>${item.spec}</strong></td>
                                        <td>${item.range}</td>
                                        <td><strong>${item.avg}</strong></td>
                                        <td>
                                            <span class="badge ${item.change.includes('+') ? 'badge-up' : 'badge-down'}">
                                                ${item.change.includes('+') ? '▲' : '▼'} ${item.change.replace('+', '').replace('-', '')}
                                            </span>
                                        </td>
                                        <td>${item.use}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>

                    <!-- 市场分析 -->
                    <div class="analysis-section">
                        <div class="section-title">📈 市场分析</div>
                        <div class="analysis-grid">
                            <div class="analysis-card">
                                <h4>📊 趋势判断</h4>
                                <p><strong>${analysisData.trend}</strong></p>
                                <p>${commodity.name}价格当前呈现${commodity.change > 0 ? '震荡上行' : '承压整理'}态势，技术面显示${analysisData.technical}。</p>
                            </div>
                            <div class="analysis-card">
                                <h4>🎯 支撑与阻力</h4>
                                <p><strong>支撑位分析</strong>：${analysisData.support}</p>
                                <p><strong>阻力位分析</strong>：${analysisData.resistance}</p>
                                <p style="margin-top: 10px; font-size: 13px; color: var(--text-light);">💡 建议：关注关键价位的突破情况</p>
                            </div>
                            <div class="analysis-card">
                                <h4>⚡ 操作建议</h4>
                                <p>${analysisData.suggestion}</p>
                                <p style="margin-top: 10px; font-size: 13px; color: var(--text-light);">📋 风险提示：注意仓位控制和风险防范</p>
                            </div>
                            <div class="analysis-card">
                                <h4>📈 基本面分析</h4>
                                <p>${analysisData.fundamental}</p>
                                <p style="margin-top: 10px; font-size: 13px; color: var(--text-light);">🌍 宏观因素：全球经济环境对${commodity.category}价格影响显著</p>
                            </div>
                            <div class="analysis-card">
                                <h4>⚠️ 风险提示</h4>
                                <p>${analysisData.risk}</p>
                                <p style="margin-top: 10px; font-size: 13px; color: var(--text-light);">🛡️ 风险管理：建议设置止损，分散投资组合</p>
                            </div>
                            <div class="analysis-card">
                                <h4>📅 短期展望</h4>
                                <p>未来一周${commodity.name}价格预计${commodity.change > 0 ? '震荡偏强' : '震荡整理'}，主要关注：</p>
                                <ul style="margin-top: 8px; padding-left: 20px; font-size: 13px;">
                                    <li>${commodity.category}行业政策变化</li>
                                    <li>全球供需格局演变</li>
                                    <li>宏观经济数据发布</li>
                                    <li>技术面关键突破信号</li>
                                </ul>
                            </div>
                        </div>
                    </div>

                    <!-- 相关新闻 -->
                    <div class="news-section">
                        <div class="section-title">📰 ${commodity.name}相关新闻</div>
                        <div class="news-grid">
                            ${newsData.map(news => `
                                <a href="${news.url}" class="news-item" target="_blank" rel="noopener noreferrer">
                                    <div class="news-header">
                                        <span class="news-tag" style="
                                            background: ${news.tag === '价格' ? '#ebf8ff' : 
                                                        news.tag === '需求' ? '#f0fff4' : 
                                                        news.tag === '库存' ? '#fef5e7' : '#e9d8fd'};
                                            color: ${news.tag === '价格' ? '#3182ce' : 
                                                    news.tag === '需求' ? '#276749' : 
                                                    news.tag === '库存' ? '#d69e2e' : '#805ad5'};
                                        ">${news.tag}</span>
                                        <span class="news-date">${news.date}</span>
                                    </div>
                                    <div class="news-title">${news.title}</div>
                                    <div style="font-size: 12px; color: #718096; margin-top: 8px;">📰 ${news.source}</div>
                                </a>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
        }

        // 初始化页面
        function initializePage() {
            const navContainer = document.getElementById('navContainer');
            const scrollContainer = document.getElementById('scrollContainer');
            const currentTimeElement = document.getElementById('currentTime');
            
            // 更新当前时间
            const now = new Date();
            const options = { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' };
            currentTimeElement.textContent = now.toLocaleString('zh-CN', options).replace(/\//g, '-') + ' CST';
            
            // 生成导航栏
            commodities.forEach((commodity, index) => {
                const navItem = document.createElement('a');
                navItem.className = 'nav-item';
                if (index === 0) navItem.classList.add('active');
                navItem.href = `#${commodity.id}`;
                navItem.textContent = commodity.name;
                navItem.onclick = (e) => {
                    e.preventDefault();
                    // 移除所有active类
                    document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
                    // 添加当前active类
                    navItem.classList.add('active');
                    // 滚动到对应页面
                    scrollContainer.scrollTo({
                        left: window.innerWidth * index,
                        behavior: 'smooth'
                    });
                };
                navContainer.appendChild(navItem);
            });
            
            // 生成商品页面
            commodities.forEach(commodity => {
                const pageHTML = generateCommodityPage(commodity);
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = pageHTML;
                scrollContainer.appendChild(tempDiv.firstElementChild);
            });
            
            // 监听滚动事件，更新导航栏状态
            scrollContainer.addEventListener('scroll', () => {
                const scrollPosition = scrollContainer.scrollLeft;
                const pageIndex = Math.round(scrollPosition / window.innerWidth);
                
                // 更新导航栏
                document.querySelectorAll('.nav-item').forEach((item, index) => {
                    if (index === pageIndex) {
                        item.classList.add('active');
                    } else {
                        item.classList.remove('active');
                    }
                });
            });
            
            // 支持触摸滑动
            let startX = 0;
            let isScrolling = false;
            
            scrollContainer.addEventListener('touchstart', (e) => {
                startX = e.touches[0].clientX;
                isScrolling = true;
            });
            
            scrollContainer.addEventListener('touchmove', (e) => {
                if (!isScrolling) return;
                e.preventDefault();
            });
            
            scrollContainer.addEventListener('touchend', (e) => {
                if (!isScrolling) return;
                isScrolling = false;
            });
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', initializePage);
    </script>
</body>
</html>
