<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大宗商品监控系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f7fafc; color: #2d3748; line-height: 1.6; }
        .header { position: fixed; top: 0; left: 0; right: 0; background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.1); z-index: 1000; }
        .header-content { max-width: 1400px; margin: 0 auto; padding: 12px 16px; }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .header-title { font-size: 18px; font-weight: 700; color: #1a365d; }
        .current-time { font-size: 12px; color: #718096; }
        .commodity-nav { display: flex; overflow-x: auto; gap: 6px; scrollbar-width: none; }
        .commodity-nav::-webkit-scrollbar { display: none; }
        .nav-item { padding: 6px 14px; background: white; border: 1px solid #e2e8f0; border-radius: 5px; font-size: 12px; font-weight: 500; white-space: nowrap; cursor: pointer; flex-shrink: 0; }
        .nav-item:hover, .nav-item.active { background: #1a365d; color: white; border-color: #1a365d; }
        .main-content { margin-top: 90px; padding: 0 12px 40px; }
        .page { display: none; max-width: 1400px; margin: 0 auto; }
        .page.active { display: block; }
        .page-header { background: linear-gradient(135deg, #1a365d 0%, #2c5282 100%); color: white; padding: 20px; border-radius: 10px; margin-bottom: 12px; }
        .commodity-info { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; flex-wrap: wrap; gap: 8px; }
        .commodity-name { font-size: 22px; font-weight: 700; }
        .commodity-symbol { font-size: 13px; opacity: 0.9; }
        .price-display { text-align: right; }
        .current-price { font-size: 32px; font-weight: 800; font-family: monospace; }
        .price-change { font-size: 13px; font-weight: 600; }
        .up { color: #9ae6b4; } .down { color: #fc8181; }
        .page-header p { font-size: 12px; opacity: 0.9; }
        .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 12px; }
        .stat-card { background: white; padding: 14px; border-radius: 8px; border: 1px solid #e2e8f0; }
        .stat-label { font-size: 11px; color: #718096; margin-bottom: 4px; }
        .stat-value { font-size: 16px; font-weight: 700; color: #1a365d; font-family: monospace; }
        .stat-change { font-size: 11px; margin-top: 2px; }
        .section { background: white; padding: 16px; border-radius: 8px; border: 1px solid #e2e8f0; margin-bottom: 12px; }
        .section-title { font-size: 15px; font-weight: 600; color: #1a365d; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 2px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th { background: #f8fafc; padding: 10px 6px; text-align: left; font-weight: 600; color: #718096; font-size: 10px; border-bottom: 2px solid #e2e8f0; }
        td { padding: 10px 6px; border-bottom: 1px solid #e2e8f0; }
        .badge { display: inline-flex; padding: 3px 8px; border-radius: 3px; font-size: 10px; font-weight: 600; }
        .badge-up { background: #c6f6d5; color: #276749; }
        .badge-down { background: #fed7d7; color: #c53030; }
        .analysis-card { background: #f8fafc; padding: 14px; border-radius: 6px; border: 1px solid #e2e8f0; margin-bottom: 10px; }
        .analysis-card h4 { font-size: 13px; margin-bottom: 6px; color: #1a365d; }
        .analysis-card p { font-size: 12px; }
        .news-item { padding: 12px; border: 1px solid #e2e8f0; border-radius: 6px; background: #fafafa; margin-bottom: 10px; }
        .news-header { display: flex; justify-content: space-between; margin-bottom: 6px; }
        .news-tag { font-size: 10px; padding: 2px 8px; border-radius: 3px; font-weight: 600; }
        .news-date { font-size: 10px; color: #718096; }
        .news-title { font-size: 12px; font-weight: 600; color: #1a365d; }
        .news-source { font-size: 10px; color: #718096; margin-top: 4px; }
        .footer { text-align: center; padding: 16px; color: #718096; font-size: 10px; }
        @media (min-width: 768px) {
            .header-content { padding: 16px 24px; }
            .header-title { font-size: 24px; }
            .main-content { margin-top: 110px; padding: 0 24px 40px; }
            .page-header { padding: 32px 40px; }
            .commodity-name { font-size: 28px; }
            .current-price { font-size: 42px; }
            .stats { grid-template-columns: repeat(4, 1fr); }
            .analysis-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
            .news-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
            table { font-size: 13px; }
            th, td { padding: 14px 10px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div class="header-top">
                <div class="header-title">📊 大宗商品监控系统</div>
                <div class="current-time" id="time"></div>
            </div>
            <div class="commodity-nav" id="nav"></div>
        </div>
    </div>
    <div class="main-content" id="content"></div>

    <script>
        var commodities = [
            { id: 'li-c', name: '碳酸锂', symbol: 'Li₂CO₃', unit: '元/吨', price: 159500, change: 800, pct: 0.50, cat: '锂盐', desc: '电池级碳酸锂（99.5%），主要用于磷酸铁锂电池，新能源汽车动力电池核心原材料。' },
            { id: 'li-h', name: '氢氧化锂', symbol: 'LiOH·H₂O', unit: '元/吨', price: 153000, change: -700, pct: -0.46, cat: '锂盐', desc: '电池级氢氧化锂（56.5%），主要用于高镍三元电池，高端电动汽车电池材料。' },
            { id: 'cu', name: '铜', symbol: 'Cu', unit: '元/吨', price: 72450, change: 180, pct: 0.25, cat: '基本金属', desc: '电解铜（99.95%），电力、建筑、家电行业核心原材料，全球经济景气度指标。' },
            { id: 'al', name: '铝', symbol: 'Al', unit: '元/吨', price: 18580, change: -25, pct: -0.13, cat: '基本金属', desc: 'A00铝锭（99.7%），广泛应用于建筑、交通、包装行业，轻量化材料代表。' },
            { id: 'sn', name: '锡', symbol: 'Sn', unit: '元/吨', price: 246200, change: 1500, pct: 0.61, cat: '小金属', desc: '锡锭（99.9%），电子焊料、镀锡钢板、合金添加剂，电子工业关键材料。' },
            { id: 'ni', name: '镍', symbol: 'Ni', unit: '元/吨', price: 133500, change: -920, pct: -0.68, cat: '基本金属', desc: '电解镍（99.9%），不锈钢主要原料，三元电池正极材料关键成分。' },
            { id: 'au', name: '黄金', symbol: 'Au', unit: '元/克', price: 569.2, change: 2.8, pct: 0.49, cat: '贵金属', desc: 'Au99.99，避险资产，央行储备，珠宝首饰，电子工业。' },
            { id: 'ag', name: '白银', symbol: 'Ag', unit: '元/千克', price: 7875, change: 38, pct: 0.48, cat: '贵金属', desc: 'Ag99.99，工业用途广泛，光伏、电子、摄影、饰品。' },
            { id: 'fe', name: '铁矿石', symbol: 'Fe', unit: '元/吨', price: 990, change: 15, pct: 1.54, cat: '黑色金属', desc: 'PB粉（62%），钢铁生产主要原料，基建、房地产、制造业基础。' },
            { id: 'abs', name: 'ABS塑料', symbol: 'ABS', unit: '元/吨', price: 12520, change: 95, pct: 0.76, cat: '化工', desc: '台湾奇美PA-757，家电、汽车、电子行业常用工程塑料。' },
            { id: 'paper', name: '瓦楞纸', symbol: '瓦楞纸', unit: '元/吨', price: 3140, change: -15, pct: -0.48, cat: '纸业', desc: 'AA级120g，包装行业基础材料，电商物流需求驱动。' },
            { id: 'oil', name: '原油', symbol: 'WTI', unit: '美元/桶', price: 82.80, change: -0.25, pct: -0.30, cat: '能源', desc: 'WTI原油，全球最重要能源和化工原料，经济命脉。OPEC+减产与需求担忧博弈。' }
        ];

        var priceData = {
            '碳酸锂': [{spec:'电池级99.5%',range:'158,500-160,500',avg:'159,500',change:'+800',use:'磷酸铁锂电池'},{spec:'工业级99.2%',range:'156,000-158,000',avg:'157,000',change:'+750',use:'陶瓷、玻璃'},{spec:'SMM指数',range:'159,200-159,600',avg:'159,400',change:'+750',use:'市场基准'}],
            '氢氧化锂': [{spec:'电池级56.5%',range:'151,500-154,500',avg:'153,000',change:'-700',use:'高镍三元电池'},{spec:'微粉级',range:'154,000-157,000',avg:'155,500',change:'-650',use:'高端三元电池'},{spec:'SMM指数',range:'152,800-153,200',avg:'153,000',change:'-680',use:'市场基准'}],
            '铜': [{spec:'电解铜99.95%',range:'72,200-72,700',avg:'72,450',change:'+180',use:'电线电缆'},{spec:'铜杆8mm',range:'73,100-73,600',avg:'73,350',change:'+190',use:'电力设备'},{spec:'LME三月期铜',range:'$9,150-9,250',avg:'$9,200',change:'+$22',use:'国际基准'}],
            '铝': [{spec:'A00铝锭99.7%',range:'18,500-18,660',avg:'18,580',change:'-25',use:'建筑型材'},{spec:'铝合金ADC12',range:'19,250-19,500',avg:'19,375',change:'-20',use:'压铸件'},{spec:'LME三月期铝',range:'$2,380-2,420',avg:'$2,400',change:'-$3',use:'国际基准'}],
            '锡': [{spec:'锡锭99.9%',range:'245,500-246,900',avg:'246,200',change:'+1,500',use:'焊料'},{spec:'锡焊条',range:'248,000-250,000',avg:'249,000',change:'+1,400',use:'电子焊接'},{spec:'LME三月期锡',range:'$31,200-31,600',avg:'$31,400',change:'+$185',use:'国际基准'}],
            '镍': [{spec:'电解镍99.9%',range:'133,000-134,000',avg:'133,500',change:'-920',use:'不锈钢'},{spec:'电池级硫酸镍',range:'32,500-33,200',avg:'32,850',change:'-350',use:'三元前驱体'},{spec:'LME三月期镍',range:'$16,800-17,100',avg:'$16,950',change:'-$115',use:'国际基准'}],
            '黄金': [{spec:'Au99.99',range:'568.5-569.9',avg:'569.2',change:'+2.8',use:'投资储备'},{spec:'国际金价',range:'$2,355-2,370',avg:'$2,362.5',change:'+$11.5',use:'美元/盎司'},{spec:'黄金期货',range:'569.5-571.0',avg:'570.2',change:'+2.5',use:'上期所'}],
            '白银': [{spec:'Ag99.99',range:'7,860-7,890',avg:'7,875',change:'+38',use:'工业/投资'},{spec:'国际银价',range:'$28.3-28.7',avg:'$28.5',change:'+$0.14',use:'美元/盎司'},{spec:'白银期货',range:'7,880-7,920',avg:'7,900',change:'+35',use:'上期所'}],
            '铁矿石': [{spec:'PB粉62%',range:'985-995',avg:'990',change:'+15',use:'钢厂原料'},{spec:'卡粉65%',range:'1,085-1,110',avg:'1,097.5',change:'+18',use:'高品质铁矿'},{spec:'新加坡期货',range:'$132-135',avg:'$133.5',change:'+$2.0',use:'国际基准'}],
            'ABS塑料': [{spec:'台湾奇美',range:'12,450-12,590',avg:'12,520',change:'+95',use:'家电外壳'},{spec:'韩国LG',range:'12,620-12,750',avg:'12,685',change:'+90',use:'汽车配件'},{spec:'国产0215A',range:'12,300-12,450',avg:'12,375',change:'+85',use:'通用塑料'}],
            '瓦楞纸': [{spec:'AA级120g',range:'3,130-3,150',avg:'3,140',change:'-15',use:'纸箱包装'},{spec:'A级140g',range:'3,260-3,300',avg:'3,280',change:'-12',use:'重型包装'},{spec:'废纸OCC',range:'1,850-1,900',avg:'1,875',change:'-10',use:'造纸原料'}],
            '原油': [{spec:'WTI原油',range:'82.5-83.1',avg:'82.80',change:'-0.25',use:'美国基准'},{spec:'布伦特原油',range:'87.2-87.8',avg:'87.50',change:'-0.20',use:'国际基准'},{spec:'上海期货SC',range:'645-655',avg:'650',change:'-2.5',use:'人民币/桶'}]
        };

        var currentIdx = 0;

        function switchTab(idx) {
            var navs = document.querySelectorAll('.nav-item');
            var pages = document.querySelectorAll('.page');
            for (var i = 0; i < navs.length; i++) {
                navs[i].classList.toggle('active', i === idx);
                pages[i].classList.toggle('active', i === idx);
            }
            currentIdx = idx;
            window.scrollTo(0, 0);
        }

        function init() {
            var nav = document.getElementById('nav');
            var content = document.getElementById('content');
            
            for (var i = 0; i < commodities.length; i++) {
                var c = commodities[i];
                var isUp = c.change >= 0;
                var prefix = c.unit === '美元/桶' ? '$' : '¥';
                
                // Nav button
                var btn = document.createElement('button');
                btn.className = 'nav-item' + (i === 0 ? ' active' : '');
                btn.textContent = c.name;
                btn.onclick = (function(index) { return function() { switchTab(index); }; })(i);
                nav.appendChild(btn);
                
                // Page content
                var rows = '';
                var pdata = priceData[c.name] || [];
                for (var j = 0; j < pdata.length; j++) {
                    var r = pdata[j];
                    rows += '<tr><td><strong>' + r.spec + '</strong></td><td>' + r.range + '</td><td>' + r.avg + '</td><td><span class="badge ' + (r.change.indexOf('+') >= 0 ? 'badge-up' : 'badge-down') + '">' + r.change + '</span></td><td>' + r.use + '</td></tr>';
                }
                
                var html = '<div class="page ' + (i === 0 ? 'active' : '') + '">' +
                    '<div class="page-header"><div class="commodity-info"><div><div class="commodity-name">' + c.name + '</div><div class="commodity-symbol">' + c.symbol + ' | ' + c.cat + '</div></div><div class="price-display"><div class="current-price">' + prefix + c.price.toLocaleString() + '</div><div class="price-change ' + (isUp ? 'up' : 'down') + '">' + (isUp ? '▲' : '▼') + ' ' + Math.abs(c.change) + ' (' + (isUp ? '+' : '') + c.pct.toFixed(2) + '%)</div></div></div><p>' + c.desc + '</p></div>' +
                    '<div class="stats"><div class="stat-card"><div class="stat-label">周涨跌</div><div class="stat-value">' + (isUp ? '+' : '') + (c.change * 5).toLocaleString() + '</div><div class="stat-change ' + (isUp ? 'up' : 'down') + '">周' + (isUp ? '涨' : '跌') + Math.abs(c.pct * 5).toFixed(1) + '%</div></div><div class="stat-card"><div class="stat-label">月涨跌</div><div class="stat-value">' + (isUp ? '+' : '') + (c.change * 22).toLocaleString() + '</div><div class="stat-change ' + (isUp ? 'up' : 'down') + '">月' + (isUp ? '涨' : '跌') + Math.abs(c.pct * 22).toFixed(1) + '%</div></div><div class="stat-card"><div class="stat-label">年涨跌</div><div class="stat-value">' + (isUp ? '+' : '') + (c.change * 252).toLocaleString() + '</div><div class="stat-change ' + (isUp ? 'up' : 'down') + '">年' + (isUp ? '涨' : '跌') + Math.abs(c.pct * 252).toFixed(1) + '%</div></div><div class="stat-card"><div class="stat-label">市场情绪</div><div class="stat-value">' + (isUp ? '看涨' : '看跌') + '</div><div class="stat-change">' + (isUp ? '多头占优' : '空头占优') + '</div></div></div>' +
                    '<div class="section"><div class="section-title">📊 现货价格详情</div><table><thead><tr><th>规格</th><th>价格区间</th><th>均价</th><th>涨跌</th><th>用途</th></tr></thead><tbody>' + rows + '</tbody></table></div>' +
                    '<div class="section"><div class="section-title">📈 市场分析</div><div class="analysis-grid"><div class="analysis-card"><h4>趋势判断</h4><p>' + c.name + '当前呈现<strong>' + (isUp ? '震荡上行' : '承压整理') + '</strong>态势。</p></div><div class="analysis-card"><h4>支撑与阻力</h4><p><strong>支撑位：</strong>技术面关键价位。<br><strong>阻力位：</strong>' + (isUp ? '上方需量能配合' : '反弹阻力较大') + '。</p></div><div class="analysis-card"><h4>操作建议</h4><p>' + (isUp ? '谨慎追高，分批建仓' : '关注底部，逐步布局') + '，注意风险控制。</p></div></div></div>' +
                    '<div class="section"><div class="section-title">📰 相关新闻 (2026-03-12)</div><div class="news-grid"><div class="news-item"><div class="news-header"><span class="news-tag" style="background:#ebf8ff;color:#3182ce">价格</span><span class="news-date">03-12 09:30</span></div><div class="news-title">' + c.name + '现货价格' + (isUp ? '上涨' : '下跌') + Math.abs(c.change) + c.unit.split('/')[0] + '</div><div class="news-source">📰 SMM上海有色网</div></div><div class="news-item"><div class="news-header"><span class="news-tag" style="background:#f0fff4;color:#276749">需求</span><span class="news-date">03-12 08:15</span></div><div class="news-title">下游' + (isUp ? '采购意愿增强' : '观望情绪浓厚') + '，成交' + (isUp ? '活跃' : '清淡') + '</div><div class="news-source">📰 行业快讯</div></div></div></div>' +
                    '<div class="footer"><p>🔍 数据来源：SMM上海有色网、LME、COMEX、SHFE等交易所</p><p>🔄 更新时间：2026-03-12 09:55 | 数据仅供参考</p></div>' +
                    '</div>';
                content.insertAdjacentHTML('beforeend', html);
            }
            
            document.getElementById('time').textContent = new Date().toLocaleString('zh-CN').replace(/\//g, '-') + ' CST';
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
