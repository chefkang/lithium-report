name: Auto Update Lithium Report

on:
  schedule:
    # 每天UTC 01:00运行 = 北京时间 09:00
    - cron: '0 1 * * *'
  workflow_dispatch:
    # 允许手动触发

permissions:
  contents: write

jobs:
  update-report:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Update lithium report
      run: python update_lithium_report.py
      
    - name: Check for changes
      id: check_changes
      run: |
        if [ -n "$(git status --porcelain)" ]; then
          echo "changed=true" >> $GITHUB_OUTPUT
        else
          echo "changed=false" >> $GITHUB_OUTPUT
        fi
        
    - name: Commit and push changes
      if: steps.check_changes.outputs.changed == 'true'
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add index.html update_log.txt
        git commit -m "🔄 Auto update lithium report - $(date +'%Y-%m-%d %H:%M')"
        git push
        
    - name: Create update summary
      run: |
        echo "### 📊 锂盐报告更新完成" >> $GITHUB_STEP_SUMMARY
        echo "- 📅 更新时间: $(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_STEP_SUMMARY
        echo "- 🌐 报告地址: https://chefkang.github.io/lithium-report/" >> $GITHUB_STEP_SUMMARY
        if [ -f update_log.txt ]; then
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📝 更新日志" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -20 update_log.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        fi
